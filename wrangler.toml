# Cloudflare Workers 配置
name = "jack-ablin"
main = "./src/index.ts"
compatibility_date = "2025-11-25"
workers_dev = true

[vars]
NODE_ENV = "production"
VITE_API_URL = "https://houduan-api.onrender.com"
VITE_Web_Trader_UUID = "39968c24-67bd-4f12-a5e4-ff959ce03c50"

# 静态资源配置
[assets]
directory = "./dist/"
not_found_handling = "single-page-application"
binding = "ASSETS"
# 只有 API 请求先运行 Worker，其他请求直接由 Cloudflare 处理静态资源
run_worker_first = [ "/api/*" ]

# 路由配置
[[routes]]
# 匹配根域名 jack-ablin.com下所有路径
pattern = "jack-ablin.com/*"
zone_name = "jack-ablin.com"

[[routes]]
# 匹配 www.jack-ablin.com下所有路径
pattern = "www.jack-ablin.com/*"
zone_name = "jack-ablin.com"
